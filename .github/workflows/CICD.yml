name: CICD

on:
  workflow_dispatch:
   inputs:
     envirement:
      description: This is the envirement value where this workflow run
      default: 'dev'
      required: true
      type: choice
      options:
         - dev
         - prod
         - staging
       
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: echo "Code cloned from GitHub"

  build:
    runs-on: ubuntu-latest
    needs: code
    steps:
      - name: Build Docker container
        run: echo "Docker container build"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test the container
        run: echo "Docker container tested"

  deploy:
    if: inputs.envirement == 'dev'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy application
        run: echo "Application deployed using Docker Compose"
